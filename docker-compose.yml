name: rojgarapp

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rojgar}
      POSTGRES_USER: ${POSTGRES_USER:-rojgar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rojgar}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rojgar}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DATABASE_URL: postgres://${POSTGRES_USER:-rojgar}:${POSTGRES_PASSWORD:-rojgar}@db:5432/${POSTGRES_DB:-rojgar}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
